<!DOCTYPE html>
<html>
<head>
    <title>New HTML Table</title>
</head>
<body>

<h2>Employee Table</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Position</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>Alice</td>
            <td>Manager</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Bob</td>
            <td>Developer 3</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Charlie</td>
            <td>Designer</td>
        </tr>
    </tbody>
</table>

</body>
</html>
